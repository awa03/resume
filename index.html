<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./tailwind/output.css" rel="stylesheet">
</head>
<body class="">

<div class="min-h-screen bg-gray-900 flex items-center justify-center p-6">
  <div class="w-full max-w-6xl h-[80vh] bg-black text-green-400 rounded-xl shadow-2xl flex flex-col font-mono overflow-hidden">

    <!-- Terminal Header -->
    <div class="flex items-center gap-2 bg-gray-800 px-4 py-2">
      <div class="w-3 h-3 bg-red-500 rounded-full"></div>
      <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
      <div class="w-3 h-3 bg-green-500 rounded-full"></div>
      <span class="ml-4 text-gray-400 text-sm">aiden's resume</span>
    </div>

    <!-- Terminal Body -->
    <div id="term_body" class="flex-1 p-4 overflow-auto no-scrollbar space-y-1">
          <p><span class="text-blue-400">aiden@machine</span>:<span class="text-purple-400">~</span>$ help </p>
          <p class="text-gray-400">Welcome to my Resume! Please look around!</p>
          <p class="text-gray-400">This project is being revamped for 2026! Come back later for a completed version</p>
          <p class="text-gray-400">ls  - list directory contents</p>
          <p class="text-gray-400">cd  - change directory</p>
          <p class="text-gray-400">cat - view file contents</p>
          <p id="term_user_entry"><span class="text-blue-400">user@machine</span>:<span class="text-purple-400">~</span>$ 
            <input id="term_btn" class="border-0 focus:outline-none focus:ring-0 focus:border-transparent" />
          </p>
    </div>

  </div>
</div>
<script src="./main.js"></script>
</body>
</html>
